<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MISOLABO - 伊波ライ非公式ファンサイト -</title>
<link rel="icon" type="image/svg+xml" sizes="32x32" href="assets/misolabo-favicon_32X32.svg">
<link rel="icon" type="image/svg+xml" sizes="64x64" href="assets/misolabo-favicon_64X64.svg">
<link rel="icon" type="image/svg+xml" sizes="128x128" href="assets/misolabo-favicon_128X128.svg">
<link rel="icon" type="image/svg+xml" sizes="256x256" href="assets/misolabo-favicon_256X256.svg">
<link rel="apple-touch-icon" href="assets/misolabo-favicon_256X256.svg">
<script>
  const initialTheme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  document.documentElement.setAttribute(
    'data-theme',
    initialTheme
  );
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=55-topbar-60-1">
</head>
<body>

<!-- Mobile overlay backdrop -->
<div class="mobile-overlay" id="mobileOverlay" onclick="closeMobileNav()"></div>

<!-- Mobile header (shown only on mobile via CSS) -->
<header class="mobile-header" id="mobileHeader">
  <button class="mobile-menu-btn" onclick="toggleMobileNav()" aria-label="Open menu">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <button class="mobile-header-title" type="button" onclick="goHome()" aria-label="Go to Home">MISOLABO</button>
  <button class="mobile-header-right" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</header>

<!-- ═══ SIDEBAR ═══ -->
<aside class="sidebar" aria-label="Primary navigation">
  <button class="wordmark" type="button" onclick="goHome()" title="Go to Home" aria-label="Go to Home">
    <span class="wordmark-name">MISOLABO</span>
    <span class="wordmark-sub">Inami Rai<br>Unofficial Fansite</span>
  </button>

  <nav class="nav" aria-label="Main menu">
    <button class="nav-item active" type="button" onclick="setNav(this)" aria-current="page">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </button>
    <button class="nav-item" type="button" onclick="setNav(this)">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      <span>Database</span>
    </button>
    <button class="nav-item" type="button" onclick="setNav(this)">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><polygon points="10 9 16 12 10 15 10 9"/></svg>
      <span>Music Video</span>
    </button>
    <button class="nav-item" type="button" onclick="setNav(this)">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <span>My Favorites</span>
    </button>
    <button class="nav-item" type="button" onclick="setNav(this)">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="5" cy="6" r="1.6" fill="currentColor" stroke="none"/><circle cx="5" cy="12" r="1.6" fill="currentColor" stroke="none"/><circle cx="5" cy="18" r="1.6" fill="currentColor" stroke="none"/>
        <line x1="9" y1="6" x2="21" y2="6"/><line x1="9" y1="12" x2="21" y2="12"/><line x1="9" y1="18" x2="21" y2="18"/>
      </svg>
      <span>Playlist</span>
    </button>
    <button class="nav-item" type="button" onclick="setNav(this)">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>About</span>
    </button>
  </nav>

  <div class="sidebar-footer">
    <div class="sidebar-controls">
      <button class="sidebar-icon-btn collapse-btn" id="collapseBtn" title="Collapse sidebar" aria-label="Collapse sidebar" onclick="toggleSidebar()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="sidebar-icon-btn theme-btn" id="themeBtn" title="Toggle light/dark" aria-label="Toggle light/dark" onclick="toggleTheme()">
        <svg id="themeIcon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>
</aside>

<!-- ═══ MAIN ═══ -->
<main class="main">

  <!-- Left: Song List -->
  <div class="song-section">
    <div class="topbar">
      <div class="topbar-row">
        <div class="topbar-controls">
          <button class="topbar-toggle-btn" id="filterToggleBtn" onclick="toggleFilterPanel()" title="Filter" aria-label="Filter" aria-controls="filterPanel" aria-expanded="false">
            <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
            <span class="topbar-toggle-label">Filter</span>
            <span class="filter-active-dot" id="filterActiveDot"></span>
            <svg class="toggle-chevron" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <button class="topbar-toggle-btn" id="sortToggleBtn" onclick="toggleSortPanel()" title="Sort" aria-label="Sort" aria-controls="sortPanel" aria-expanded="false">
            <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="9" y1="18" x2="15" y2="18"/></svg>
            <span class="topbar-toggle-label">Sort</span>
            <svg class="toggle-chevron" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <button class="topbar-toggle-btn" id="collabToggleBtn" onclick="toggleCollabPopup(event)" title="Collab" aria-label="Collab" aria-controls="collabPopup" aria-expanded="false">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 11a4 4 0 1 0-8 0"/><path d="M3 21a7 7 0 0 1 14 0"/><circle cx="17" cy="8" r="3"/><path d="M17 14a5 5 0 0 1 4 7"/></svg>
            <span class="topbar-toggle-label">Collab</span>
            <span class="filter-active-dot" id="collabActiveDot"></span>
          </button>
        </div>
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-input" type="text" placeholder="SEARCH" aria-label="Search songs" oninput="filterSongs(this.value)">
        </div>
        <span class="song-count" id="songCount">— songs</span>
      </div>
      <!-- Collapsible filter panel -->
      <div class="collapsible-panel" id="filterPanel" aria-hidden="true">
        <div class="filters control-chip-row">
          <!-- ORIGINAL / COVER -->
          <div class="filter-group">
            <button class="tag original-tag" type="button" onclick="toggleTag(this)" aria-pressed="false">original</button>
            <button class="tag cover-tag" type="button" onclick="toggleTag(this)" aria-pressed="false">cover</button>
          </div>
          <div class="filter-group-sep"></div>
          <!-- SOLO / COLLAB -->
          <div class="filter-group">
            <button class="tag solo-tag" type="button" onclick="toggleTag(this)" aria-pressed="false">solo</button>
            <button class="tag collab-tag" type="button" onclick="toggleTag(this)" aria-pressed="false">collab</button>
          </div>
          <div class="filter-group-sep"></div>
          <!-- BAND / ACOUSTIC / PIANO -->
          <div class="filter-group">
            <button class="tag band-tag" type="button" onclick="toggleTag(this)" aria-pressed="false">band</button>
            <button class="tag acoustic-tag" type="button" onclick="toggleTag(this)" aria-pressed="false">acoustic</button>
            <button class="tag piano-tag" type="button" onclick="toggleTag(this)" aria-pressed="false">piano</button>
          </div>
          <div class="filter-group-sep"></div>
          <!-- MV / STAGE -->
          <div class="filter-group">
            <button class="tag mv-tag" type="button" onclick="toggleTag(this)" aria-pressed="false">mv</button>
            <button class="tag stage-tag" type="button" onclick="toggleTag(this)" aria-pressed="false">stage</button>
          </div>
          <div class="filter-group-sep"></div>
          <button class="tag reset-tag" type="button" onclick="resetFilters()">↺ Reset</button>
        </div>
      </div>
      <!-- Collapsible sort panel -->
      <div class="collapsible-panel" id="sortPanel" aria-hidden="true">
        <div class="sort-panel-inner control-chip-row" id="sortPanelInner"></div>
      </div>
      <div class="collab-popup" id="collabPopup" role="dialog" aria-labelledby="collabPopupTitle" aria-hidden="true">
        <div class="collab-popup-header">
          <div>
            <div class="collab-popup-title" id="collabPopupTitle">Collab</div>
            <div class="collab-popup-sub" id="collabPopupSub">Select collaborators</div>
          </div>
          <button class="collab-popup-close" type="button" onclick="closeCollabPopup()" aria-label="Close collab filter">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="collab-popup-list" id="collabPopupList"></div>
        <div class="collab-popup-actions">
          <span id="collabMoreSlot"></span>
          <button class="collab-reset-btn" type="button" onclick="resetCollabFilters()">
            <span class="collab-action-icon" aria-hidden="true">↺</span>
            <span class="collab-action-label">RESET</span>
          </button>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="list-action-bar" id="songActionBar" style="display:none;">
        <button class="queue-action-btn primary" onclick="playCurrentListSequential()">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Play
        </button>
        <button class="queue-action-btn" onclick="playCurrentListShuffle()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
          Shuffle
        </button>
      </div>
      <div class="song-list" id="songList"></div>
    </div>

    <button class="now-playing-jump" id="nowPlayingJump" type="button" onclick="jumpToPlayingSong()">
      <svg class="now-playing-jump-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 19V5"/>
        <path d="M5 12l7-7 7 7"/>
      </svg>
      <span>Back to Now Playing</span>
    </button>
    <button class="back-to-top-jump" id="backToTopJump" type="button" onclick="jumpToSongListTop()">
      <svg class="now-playing-jump-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 19V5"/>
        <path d="M5 12l7-7 7 7"/>
      </svg>
      <span>Back to Top</span>
    </button>

    <!-- Playlist Page (renders via JS) -->
    <div class="playlist-page" id="playlistPage"></div>

    <!-- Music Video Page (renders via JS) -->
    <div class="mv-gallery-page" id="mvGalleryPage"></div>

    <!-- Home Page (renders via JS) -->
    <div class="home-page" id="homePage"></div>

    <!-- About Page (renders via JS) -->
    <div class="about-page" id="aboutPage"></div>
  </div>

  <!-- Mobile close video bar — between YT video and song-section on mobile -->
  <div class="yt-mobile-close-bar" id="ytMobileCloseBar">
    <button class="yt-mobile-close-btn" onclick="closeYT()">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
      Close
    </button>
  </div>

  <!-- Right: YouTube Side Panel -->
  <div class="yt-side" id="ytSide">
    <div class="yt-header">
      <span class="yt-kicker" id="ytKicker">
        <span class="yt-kicker-prefix">▶ Now Playing</span><span class="yt-kicker-source" id="ytKickerSource"></span>
      </span>
      <button class="yt-close" onclick="closeYT()">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Close
      </button>
    </div>

    <div class="yt-embed" id="ytEmbed"></div>

      <div class="yt-info">
      <div class="yt-song-header">
        <div class="yt-song-main">
          <div class="yt-song-heading">
            <div class="yt-song-title" id="ytSongTitle"></div>
            <div class="yt-song-artist" id="ytSongArtist"></div>
          </div>
        </div>
        <div class="yt-song-tags" id="ytSongTags"></div>
      </div>

      <div class="yt-meta-group">
        <div class="yt-meta-block yt-hidden" id="ytCollabSection" style="display:none;">
          <div class="yt-meta-label">Collaborators</div>
          <div class="yt-collab-chips" id="ytCollabChips"></div>
        </div>

        <div class="yt-meta-block" id="ytVideoSection" style="display:none;">
          <div class="yt-meta-label">Video</div>
          <a class="yt-video-link" id="ytVideoTitle" href="#" target="_blank" rel="noopener"></a>
        </div>

        <div class="yt-meta-block" id="ytDateSection" style="display:none;">
          <div class="yt-meta-label">Date</div>
          <div class="yt-date-value" id="ytDateValue"></div>
        </div>
      </div>
    </div>
  </div>

</main>

<!-- ═══ MANUAL RECORD DETAIL MODAL ═══ -->
<div class="manual-detail-overlay" id="manualDetailOverlay" onclick="closeManualRecordDetail()">
  <article class="manual-detail-box" role="dialog" aria-modal="true" aria-labelledby="manualDetailTitle" onclick="event.stopPropagation()">
    <header class="manual-detail-header">
      <span class="manual-detail-kicker">Record Detail</span>
      <button class="manual-detail-close" type="button" onclick="closeManualRecordDetail()" aria-label="Close record detail">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
        Close
      </button>
    </header>
    <div class="manual-detail-body" id="manualDetailBody"></div>
  </article>
</div>

<!-- ═══ ADD-TO-PLAYLIST MODAL ═══ -->
<div class="modal-overlay" id="addToPlaylistOverlay">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">Add to Playlist</span>
      <button class="modal-close" onclick="closeAddToPlaylistModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-song-name" id="modalSongName"></div>
    <div class="modal-create-row">
      <input class="modal-create-input" id="modalNewPlaylistInput" type="text" placeholder="NEW PLAYLIST"
        onkeydown="if(event.key==='Enter') createPlaylistFromModal()">
      <button class="modal-create-btn" type="button" onclick="createPlaylistFromModal()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Create
      </button>
    </div>
    <div class="modal-list" id="modalPlaylistList"></div>
    <div class="modal-footer">
      <button class="modal-btn secondary" onclick="closeAddToPlaylistModal()">Cancel</button>
      <button class="modal-btn primary" onclick="confirmAddToPlaylist()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="appToast" role="status" aria-live="polite"></div>

<!-- ═══ PLAYER ═══ -->
<div class="player">
  <div class="player-info">
    <div class="player-thumb" id="playerThumb">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--text-muted)" stroke="none"><path d="M9 3v11.586A3.5 3.5 0 1 0 11 18V8.5l10-1.667V14.1A3.5 3.5 0 1 0 23 17.5V2.167L9 3Z"/></svg>
    </div>
    <div class="player-song">
      <div class="player-title" id="playerTitle">— Not Playing —</div>
      <div class="player-artist" id="playerArtist"></div>
    </div>
  </div>

  <div class="player-controls">
    <div class="controls-btns">
      <button class="ctrl-btn" id="shuffleBtn" title="Shuffle" aria-label="Shuffle" onclick="toggleShuffle()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
      </button>
      <button class="ctrl-btn" title="Previous" aria-label="Previous" onclick="playPrev()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
      </button>
      <button class="ctrl-play" id="playBtn" aria-label="Play" onclick="togglePlay()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" id="playIcon"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <button class="ctrl-btn" title="Next" aria-label="Next" onclick="playNext()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
      </button>
      <button class="ctrl-btn" id="repeatBtn" title="Repeat" aria-label="Repeat" onclick="toggleRepeat()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="repeatIcon"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
      </button>
    </div>
    <div class="progress-wrap">
      <span class="progress-time" id="currentTime">0:00</span>
      <div class="progress-bar" id="progressBar"
        onpointerdown="beginSeek(event)"
        onpointermove="previewSeek(event)"
        onpointerleave="hideSeekTooltip(event)">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-preview-marker" id="progressPreviewMarker"></div>
        <div class="progress-tooltip" id="progressTooltip">00:00</div>
      </div>
      <span class="progress-time" id="totalTime">0:00</span>
    </div>
  </div>

  <div class="player-right">
    <button class="ctrl-btn" id="playerFavBtn" title="Favorite" aria-label="Favorite" onclick="togglePlayerFav(event)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="playerFavIcon"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    </button>
    <button class="ctrl-btn" id="addToPlaylistBtn" title="Add to playlist" aria-label="Add to playlist" onclick="openAddToPlaylist(event)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <div class="volume-wrap">
      <button class="ctrl-btn" id="volumeBtn" title="Volume" aria-label="Volume" onclick="toggleVolumePopup(event)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="volumeIcon">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 010 14.14"/>
          <path d="M15.54 8.46a5 5 0 010 7.07"/>
        </svg>
      </button>
      <div class="volume-popup" id="volumePopup">
        <span class="volume-label" id="volumeLabel">100</span>
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100" oninput="setVolume(this.value)">
      </div>
    </div>
  </div>
</div>

<!-- Mobile bottom navigation (shown only on mobile via CSS) -->
<nav class="mobile-bottom-nav" aria-label="Mobile main menu">
  <button class="nav-item mobile-tab-item active" type="button" onclick="setNav(this)" aria-current="page">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
